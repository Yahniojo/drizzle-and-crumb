<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Drizzle & Crumb</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
  <a href="index.html">Home</a>
  <a href="menu.html">Menu</a>
  <a href="order.html">Order</a>
  <a href="contact.html">Contact</a>
</nav>

<h1 class="page-title">Checkout</h1>

<h2>Your Order 🛒</h2>
<div id="order-summary"></div>
<div class="checkout-container">

  <input type="text" placeholder="Full Name">

  <input type="text" placeholder="Phone Number">

  <input type="text" placeholder="Address">


  <button class="checkout-btn" onclick="placeOrder()">Place Order</button>

</div>
<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};

// SHOW ORDER
function displayOrder() {

  let summary = document.getElementById("order-summary");

  summary.innerHTML = "";

  let total = 0;

  for (let item in cart) {

    let itemTotal =
      cart[item].price * cart[item].quantity;

    summary.innerHTML += `
      <p>
        ${item} x${cart[item].quantity}
        - $${itemTotal.toFixed(2)}
      </p>
    `;

    total += itemTotal;
  }

  summary.innerHTML += `
    <h3>Total: $${total.toFixed(2)}</h3>
  `;
}

displayOrder();

// PLACE ORDER
function placeOrder() {

  let name =
    document.querySelector("input[placeholder='Full Name']").value;

  let phone =
    document.querySelector("input[placeholder='Phone Number']").value;

  let address =
    document.querySelector("input[placeholder='Address']").value;

  if (!name || !phone || !address) {
    alert("Please fill in all fields!");
    return;
  }
let orderNumber =
  Math.floor(1000 + Math.random() * 9000);
let message =
  `🍓 Drizzle & Crumb Order #${orderNumber}\n\n`;

for (let item in cart) {
  message += `${item} x${cart[item].quantity} - $${(cart[item].price * cart[item].quantity).toFixed(2)}\n`;
}

message += `\nName: ${name}\nPhone: ${phone}\nAddress: ${address}`;

 window.open(
  "https://wa.me/13062417546?text=" + encodeURIComponent(message),
  "_blank"
);

window.location.href = "confirmed.html";
}

</script>

</body>
</html>
