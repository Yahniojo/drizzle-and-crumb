<!DOCTYPE html>

    <div class="status-step active">
      👩🏽‍🍳 Preparing Food
    </div>

    <div class="status-step">
      🚗 Out For Delivery
    </div>

    <div class="status-step">
      🍴 Delivered
    </div>

  </div>

  <div class="summary-box">

    <h2>Your Order</h2>

    <div id="confirmed-order"></div>

  </div>

  <a href="index.html">
    <button class="home-btn">
      Back To Home
    </button>
  </a>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || {};

let orderBox = document.getElementById("confirmed-order");

let total = 0;

for (let item in cart) {

  let itemTotal =
    cart[item].price * cart[item].quantity;

  orderBox.innerHTML += `
    <p>
      ${item} x${cart[item].quantity}
      - $${itemTotal.toFixed(2)}
    </p>
  `;

  total += itemTotal;
}

orderBox.innerHTML += `
  <h3>Total: $${total.toFixed(2)}</h3>
`;

</script>

</body>
</html>
